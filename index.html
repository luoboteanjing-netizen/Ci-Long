<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Chinesisch</title>
    
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000" id="theme-color-meta">
    <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CiLong">

    <!-- Styles & Script mit Versionierung -->
	<link id="cssMain" rel="stylesheet" href="./assets/css/style.css">
    <script id="jsMain" src="./assets/js/app.js"></script>
</head>

<body>

    <!-- ✅ Drei-Punkte-Menü Icon (oben rechts) -->
    <div id="menuToggle" class="menu-toggle-icon">⋮</div>

    <!-- ✅ Seitenmenü für Einstellungen (RICHTIG positioniert) -->
    <div id="sideMenu" class="side-menu">
        <h3 data-i18n="settingsTitle">Einstellungen</h3>

        <div class="menu-block">
            <div class="menu-title" data-i18n="progressTitle">Fortschritt</div>
            <button id="btnMenuExport" class="btn" data-i18n="progressExport">Fortschritt exportieren</button>
            <button id="btnMenuImport" class="btn" data-i18n="progressImport">Fortschritt importieren</button>
            <button id="btnResetLessonProgress" class="btn ghost" data-i18n="progressResetLesson">Aktuelle Lektion zurücksetzen</button>
            <button id="btnResetAllProgress" class="btn ghost" data-i18n="progressResetAll">Alle Lektionen zurücksetzen</button>
        </div>
		<!-- Im Side Menu, z.B. nach dem Reset-Bereich -->
		<div class="menu-block">
			<button id="btnInstall" class="btn">
				📲 App installieren
			</button>
		</div>
        <div class="menu-block">
            <div class="menu-title" data-i18n="languageTitle">Sprache</div>
            <label class="lbl" for="uiLangSelect" data-i18n="uiLanguageLabel">UI Sprache</label>
            <select id="uiLangSelect" class="menu-input">
                <option value="de" data-i18n="uiLanguageSelectDe">Deutsch</option>
                <option value="en" data-i18n="uiLanguageSelectEn">English</option>
                <option value="zh" data-i18n="uiLanguageSelectZh">中文</option>
                <option value="fr" data-i18n="uiLanguageSelectFr">Français</option>
            </select>
        </div>

        <div class="menu-block">
            <div class="menu-title" data-i18n="themeTitle">Theme</div>
            <select id="themeSelect" class="menu-input">
                <option value="dark" data-i18n="themeDark">Dark Mode</option>
                <option value="light-orange" data-i18n="themeLightOrange">Light‑Orange</option>
                <option value="light-warm" data-i18n="themeLightWarm">Light‑Warm</option>
                <option value="light-blue" data-i18n="themeLightBlue">Light‑Blue</option>
            </select>
        </div>


        <div class="menu-block">
            <label class="lbl" id="gapLabel" data-i18n="delayLabel">Satz‑Delay (Sekunden):</label>
            <input id="delayInput" type="number" min="0" max="15" step="0.5" value="5" class="menu-input">
        </div>

        <div class="menu-version">
            <span data-i18n="settingsVersion">Version:</span> <span id="appVersion"></span>
        </div>
    </div>

<!-- ✅ Overlay MUSS außerhalb des Menüs und Containers stehen -->
<div id="sideOverlay"></div>

<!-- ✅ Header OHNE .container → kein Top-Abstand -->
<header class="app-header">
  <img
    src="assets/img/header.png"
    alt="App Banner"
    class="header-banner"
  />
</header>

<!-- ✅ Ab hier beginnt der normale Seiteninhalt -->
<main class="container">



<!-- ====================================================================== -->
<!-- KONFIG-BLOCK -->
<!-- ====================================================================== -->

<section class="card cfg">
    <div class="grid-2">

        <!-- Lektionen -->
        <div class="pane">
  
            <select id="lessonSelect" class="select" multiple size="10"></select>

            <!-- ✅ Neue Tabelle für die Lektionen-Auswahl -->
            <div id="lessonTable" class="lesson-table"></div>

            
        </div>

        <!-- Richtung / Reihenfolge / Autoplay -->
        <div class="pane">

           

            <div class="mode-inline">
                <div class="mode-item" id="modeLeft">🇩🇪  DE</div>
                <button id="btnSwapMode" class="btn ghost swap" data-i18n-title="modeSwitchTitle">⇄</button>
                <div class="mode-item" id="modeRight">🇨🇳  ZH</div>
            </div>

            <div class="actions-inline mt8">
                <button id="btnOrderToggle" class="btn toggle" data-i18n="orderRandom">Zufällig</button>
                <button id="btnToggleHanzi" class="btn ghost toggle active">汉字</button>
                <button id="btnTogglePinyin" class="btn ghost toggle active" data-i18n="pinyinButton">Pinyin</button>
            </div>

            <div class="mt8 gap-row">
                <label class="lbl" data-i18n="autoplayGapLabel">
                    Pause zw. Karten im Autoplay:
                    <span id="gapVal" class="hint">(0.8 s)</span>
                </label>
                <input id="gapRange" type="range" min="0.6" max="2.5" step="0.1" value="0.8">
            </div>

            <!-- Stimmen -->
            <div class="two-col mt12">
                <button id="btnVoiceDe" class="btn large fit voice-btn" data-i18n="voiceButtonDe">DE Stimme</button>
                <button id="btnVoiceZh" class="btn large fit voice-btn" data-i18n="voiceButtonZh">ZH Stimme</button>
            </div>

            <div class="two-col mt8 voice-grids">
                <div class="voice-config">
                    <label class="lbl" id="rateDeLabel" data-i18n="rateDeLabel">DE Tempo <span id="rateDeVal" class="hint">(0.95)</span></label>
                    <input id="rateDeRange" class="voice-range" type="range" min="0.6" max="1.6" step="0.05" value="0.95">

                    <label class="lbl" id="pitchDeLabel" data-i18n="pitchDeLabel">DE Tonhöhe <span id="pitchDeVal" class="hint">(1.00)</span></label>
                    <input id="pitchDeRange" class="voice-range" type="range" min="0.7" max="1.5" step="0.05" value="1.00">
                </div>

                <div class="voice-config">
                    <label class="lbl" id="rateZhLabel" data-i18n="rateZhLabel">ZH Tempo <span id="rateZhVal" class="hint">(0.95)</span></label>
                    <input id="rateZhRange" class="voice-range" type="range" min="0.6" max="1.6" step="0.05" value="0.95">

                    <label class="lbl" id="pitchZhLabel" data-i18n="pitchZhLabel">ZH Tonhöhe <span id="pitchZhVal" class="hint">(1.00)</span></label>
                    <input id="pitchZhRange" class="voice-range" type="range" min="0.7" max="1.5" step="0.05" value="1.00">
                </div>
            </div>

            <div class="stack mt12">
                <div class="training-group">
                    <button id="btnStart" class="btn primary" data-i18n="trainingStart">Training starten ▶</button>
                    <button id="btnAutoplay" class="btn ghost" data-i18n="autoPlay">Autoplay ▶︎</button>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- ====================================================================== -->
<!-- LERN-KARTE -->
<!-- ====================================================================== -->

<section class="card learn" id="learnSection">

    <div class="section-title">
        <span id="cardLesson" class="left"></span>
        <span id="cardTitle" class="right"></span>
    </div>

    <div id="lessonStats" class="stats-bar"></div>

    <!-- FRAGE -->
    <div id="promptBox" class="prompt-box">

        <div class="prompt-row">
            <div class="prompt-col">
                <div id="promptWord" class="prompt big">—</div>

                <!-- Pinyin vom WORT -->
                <div id="promptWordSub" class="prompt sub small"></div>

                <!-- ✅ POS -->
                <div id="promptPOS" class="prompt pos small"></div>
            </div>
        </div>

        <div class="prompt-row">
            <div class="prompt-col">
                <div id="promptSent" class="prompt">—</div>

                <div id="speakerQuestion" class="card-speaker">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M5 9v6h4l5 5V4L9 9H5z" fill="#3b82f6"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
                        <path d="M17.66 6.34a8 8 0 0 1 0 11.32" fill="none" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
                        <path d="M19.5 4.5a10.5 10.5 0 0 1 0 15" fill="none" stroke="#dbeafe" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- LÖSUNG -->
    <div class="solution">
        <div id="solBox" class="sol masked">

            <div class="sol-part">
                <div id="solWord" class="sol-text">—</div>
            </div>

            <div class="sol-part">
                <div id="solSent" class="sol-text">—</div>
                <div id="speakerAnswer" class="card-speaker">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M5 9v6h4l5 5V4L9 9H5z" fill="#3b82f6"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
                        <path d="M17.66 6.34a8 8 0 0 1 0 11.32" fill="none" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
                        <path d="M19.5 4.5a10.5 10.5 0 0 1 0 15" fill="none" stroke="#dbeafe" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="card-controls">
        <button id="btnPrev" class="btn" data-i18n="prev">◀ Zurück</button>
        <button id="btnReveal" class="btn ghost" disabled data-i18n="reveal">Aufdecken</button>
        <button id="btnNext" class="btn" disabled data-i18n="next">Nächste ▶</button>
    </div>

    <!-- Rating-Bar -->
    <div class="ratebar" id="rateBar" style="display:none;">
        <button id="btnRateUnknown" class="btn rate bad" disabled data-i18n="rateUnknown">❌ Nicht gewusst</button>

		<button id="btnRateKnown" class="btn rate good" disabled data-i18n="rateKnown">✅ Gewusst</button>
    </div>

 <!--   <div id="sessionStats" class="stats-bar">—</div> -->
</section>

<!-- ====================================================================== -->
<!-- VOICE PANEL -->
<!-- ====================================================================== -->

<div id="voicePanel" class="debug hidden">
    <div class="debug-head">
        <div class="title" data-i18n="voicePanelTitle">Stimmen</div>
        <button id="btnCloseVoices" class="btn ghost" data-i18n="voicePanelClose">✕</button>
    </div>

    <div class="debug-body">
        <div class="debug-section">
            <div class="h" data-i18n="voicePanelHintTitle">Hinweis</div>
            <p data-i18n="voicePanelHint">Wähle eine Stimme für die aktuell geöffnete Sprache.</p>
        </div>

        <div class="debug-section">
            <div class="h" data-i18n="voiceListTitle">Stimmenliste</div>
            <div id="dbgVoices"></div>
        </div>
    </div>
</div>

</main>
</body>
</html>
